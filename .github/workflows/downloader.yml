name: 🔥 Full Downloader

on:
  workflow_dispatch:
    inputs:
      urls:
        description: '🔗 Download URLs (space-separated for multiple)'
        required: true
        type: string

      password:
        description: '🔒 Zip password (optional)'
        required: false
        default: ''
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  save-file:
    name: "📥 Download File"
    runs-on: ubuntu-latest
    timeout-minutes: 120

    permissions:
      contents: write

    steps:
      - name: Validate inputs
        run: |
          if [ -z "${{ github.event.inputs.urls }}" ]; then
            echo "❌ No download URL provided."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            zip \
            curl \
            bc \
            file

      - name: Download and package files
        shell: bash
        run: |
          set -Eeuo pipefail

          URLS="${{ github.event.inputs.urls }}"
          ZIP_PASSWORD="${{ github.event.inputs.password }}"

          SPLIT_MB=95
          STAGING="/tmp/staging_downloads"

          mkdir -p "$STAGING"
          mkdir -p tmp_downloads

          echo "$STAGING" > /tmp/staging_path.txt

          # ------------------------------------------------------------
          # HELPERS
          # ------------------------------------------------------------

          detect_bad_download() {
            local file="$1"
            [ ! -s "$file" ] && return 0
            MIME=$(file --brief --mime-type "$file" || true)
            if [[ "$MIME" == text/html* ]]; then
              return 0
            fi
            if [[ "$MIME" == text/plain* ]]; then
              SIZE=$(stat -c%s "$file" 2>/dev/null || echo 0)
              if [ "$SIZE" -lt 5000 ]; then
                return 0
              fi
            fi
            return 1
          }

          do_zip_multi() {
            local dest="$1"
            local split="$2"
            shift 2

            if [ -n "$ZIP_PASSWORD" ]; then
              zip -j -P "$ZIP_PASSWORD" -s "${split}m" "$dest" "$@"
            else
              zip -j -s "${split}m" "$dest" "$@"
            fi

            ZIP_EXIT=$?
            if [ "$ZIP_EXIT" -gt 1 ]; then
              echo "❌ zip failed with exit code $ZIP_EXIT"
              return "$ZIP_EXIT"
            fi
            echo "✅ zip completed (exit=$ZIP_EXIT)"
            return 0
          }

          download_file_post() {
            local url="$1"
            local filename="$2"
            local dest="tmp_downloads/$filename"
            local delay=5

            for attempt in 1 2 3; do
              echo "  [${attempt}/3] $filename via POST Handshake"
              rm -f "$dest"

              # Use curl to execute a direct POST request, follow authentication locations (-L),
              # and mimic standard browser handshake structures.
              curl \
                -X POST \
                -L \
                -f \
                --retry 2 \
                --retry-delay 5 \
                --connect-timeout 60 \
                --max-time 7200 \
                -H "Origin: https://earthexplorer.usgs.gov" \
                -H "Referer: https://earthexplorer.usgs.gov/" \
                -H "Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,image/apng,*/*;q=0.8" \
                -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
                -o "$dest" \
                "$url" || true

              if [ -s "$dest" ]; then
                if detect_bad_download "$dest"; then
                  echo "  Server rejected POST payload or returned an HTML error screen."
                  rm -f "$dest"
                else
                  MIME=$(file --brief --mime-type "$dest" || true)
                  echo "  Download successful ($MIME)"
                  return 0
                fi
              fi

              rm -f "$dest"
              if [ "$attempt" -lt 3 ]; then
                echo "  Retry in ${delay}s..."
                sleep "$delay"
                delay=$(( delay * 2 ))
              fi
            done

            echo "  FAILED: $filename"
            return 1
          }

          # ------------------------------------------------------------
          # PHASE 1: DOWNLOAD
          # ------------------------------------------------------------
          echo "=== Phase 1: Downloading ==="
          
          for URL in $URLS; do
            # Extract the actual product scene identity cleanly from the URL path segments
            # e.g., extracts "D3C1216-100065A013" from the url string
            CLEAN_NAME=$(echo "$URL" | awk -F'/' '{print $(NF-1)}')
            
            if [ -z "$CLEAN_NAME" ] || [ "$CLEAN_NAME" = "download" ]; then
              FILENAME="usgs_payload.zip"
            else
              FILENAME="${CLEAN_NAME}.zip"
            fi

            echo ""
            echo "URL:  $URL"
            echo "File: $FILENAME"

            download_file_post "$URL" "$FILENAME" || true
          done

          # ------------------------------------------------------------
          # PHASE 2: PACKAGE
          # ------------------------------------------------------------
          echo ""
          echo "=== Phase 2: Packaging ==="

          VALID=()
          for f in tmp_downloads/*; do
            [ -f "$f" ] && [ -s "$f" ] && VALID+=("$f")
          done

          if [ ${#VALID[@]} -gt 0 ]; then
            ARCHIVE="usgs_data_$(date +%Y%m%d_%H%M%S)"
            echo "Creating split archive chunks: $ARCHIVE"
            do_zip_multi \
              "$STAGING/${ARCHIVE}.zip" \
              "$SPLIT_MB" \
              "${VALID[@]}"

            echo "Packaged: $ARCHIVE"
          else
            echo "❌ No valid files were successfully downloaded."
            exit 1
          fi

          rm -rf tmp_downloads
          echo ""
          echo "=== Final staging contents ==="
          find "$STAGING" -type f | sort

      - name: Create Release and Upload Chunks
        uses: ncipollo/release-action@v1
        with:
          tag: "dl-${{ github.run_id }}-${{ github.run_attempt }}"
          name: "📦 Download Archive (${{ github.run_id }})"
          allowUpdates: true
          body: |
            ### 📥 Your Requested Download is Ready!
            
            Your USGS data payload has been safely broken down into separate, smaller 95MB chunk assets below.
            
            #### 🛠️ How to reassemble this file:
            1. Download **all** listed assets below to the exact same folder on your computer.
            2. Verify you have the master `.zip` file alongside all numerical extensions (`.z01`, `.z02`, etc.).
            3. Open **only** the primary file ending exactly in `.zip` using [7-Zip](https://www.7-zip.org/) or [WinRAR](https://www.rarlab.com/).
            4. Choose **Extract**, and your software will auto-combine all chunks back into your single original file.
          artifacts: "/tmp/staging_downloads/*"
          token: ${{ secrets.GITHUB_TOKEN }}
