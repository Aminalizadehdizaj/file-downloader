name: 🔥 Full Downloader

on:
  workflow_dispatch:
    inputs:
      urls:
        description: '🔗 Download URLs (space-separated for multiple)'
        required: true
        type: string

      password:
        description: '🔒 Zip password (optional)'
        required: false
        default: ''
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  save-file:
    name: "📥 Download File"
    runs-on: ubuntu-latest
    timeout-minutes: 120

    permissions:
      contents: write

    steps:
      - name: Validate inputs
        run: |
          if [ -z "${{ github.event.inputs.urls }}" ]; then
            echo "❌ No download URL provided."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            aria2 \
            zip \
            curl \
            bc \
            file

      - name: Download and package files
        shell: bash
        run: |
          set -Eeuo pipefail

          URLS="${{ github.event.inputs.urls }}"
          ZIP_PASSWORD="${{ github.event.inputs.password }}"

          SPLIT_MB=95

          STAGING="/tmp/staging_$$"

          mkdir -p "$STAGING"
          mkdir -p tmp_downloads

          echo "$STAGING" > /tmp/staging_path.txt

          # ------------------------------------------------------------
          # HELPERS
          # ------------------------------------------------------------

          sanitize_filename() {
            local f="$1"
            f=$(echo "$f" | sed 's/[?#].*//')
            f=$(echo "$f" | sed 's/%20/ /g')
            f=$(echo "$f" | sed 's/%2F/-/g')
            f=$(echo "$f" | sed 's/[<>:"\\|?*]/_/g')
            echo "$f"
          }

          detect_bad_download() {
            local file="$1"
            [ ! -s "$file" ] && return 0
            MIME=$(file --brief --mime-type "$file" || true)
            if [[ "$MIME" == text/html* ]]; then
              return 0
            fi
            if [[ "$MIME" == text/plain* ]]; then
              SIZE=$(stat -c%s "$file" 2>/dev/null || echo 0)
              if [ "$SIZE" -lt 5000 ]; then
                return 0
              fi
            fi
            return 1
          }

          do_zip_multi() {
            local dest="$1"
            local split="$2"
            shift 2

            if [ -n "$ZIP_PASSWORD" ]; then
              zip -j -P "$ZIP_PASSWORD" -s "${split}m" "$dest" "$@"
            else
              zip -j -s "${split}m" "$dest" "$@"
            fi

            ZIP_EXIT=$?
            if [ "$ZIP_EXIT" -gt 1 ]; then
              echo "❌ zip failed with exit code $ZIP_EXIT"
              return "$ZIP_EXIT"
            fi
            echo "✅ zip completed (exit=$ZIP_EXIT)"
            return 0
          }

          download_file() {
            local url="$1"
            local filename="$2"
            local dest="tmp_downloads/$filename"
            local delay=5

            for attempt in 1 2 3; do
              echo "  [${attempt}/3] $filename"
              rm -f "$dest" "${dest}.aria2"

              # Try aria2c
              aria2c \
                --follow-metalink=true \
                --content-disposition-default-utf8=true \
                --split=2 \
                --max-connection-per-server=2 \
                --min-split-size=20M \
                --max-tries=2 \
                --retry-wait=5 \
                --timeout=60 \
                --connect-timeout=30 \
                --check-certificate=false \
                --allow-overwrite=true \
                --auto-file-renaming=true \
                --dir=tmp_downloads \
                --out="$filename" \
                "$url" >/dev/null 2>&1 || true

              if [ -s "$dest" ]; then
                if detect_bad_download "$dest"; then
                  echo "  aria2c downloaded HTML/error page"
                  rm -f "$dest"
                else
                  MIME=$(file --brief --mime-type "$dest" || true)
                  echo "  aria2c OK ($MIME)"
                  return 0
                fi
              fi

              rm -f "$dest" "${dest}.aria2"

              # Curl Fallback
              curl \
                -L \
                -f \
                --retry 2 \
                --retry-delay 5 \
                --connect-timeout 30 \
                --max-time 7200 \
                -A "Mozilla/5.0" \
                -o "$dest" \
                "$url" >/dev/null 2>&1 || true

              if [ -s "$dest" ]; then
                if detect_bad_download "$dest"; then
                  echo "  curl downloaded HTML/error page"
                  rm -f "$dest"
                else
                  MIME=$(file --brief --mime-type "$dest" || true)
                  echo "  curl OK ($MIME)"
                  return 0
                fi
              fi

              rm -f "$dest"
              if [ "$attempt" -lt 3 ]; then
                echo "  Retry in ${delay}s..."
                sleep "$delay"
                delay=$(( delay * 2 ))
              fi
            done

            echo "  FAILED: $filename"
            return 1
          }

          # ------------------------------------------------------------
          # PHASE 1: DOWNLOAD
          # ------------------------------------------------------------
          echo "=== Phase 1: Downloading ==="
          
          for URL in $URLS; do
            FILENAME=$(basename "$URL")
            FILENAME=$(sanitize_filename "$FILENAME")
            if [ -z "$FILENAME" ]; then
              FILENAME="file_$(date +%s)"
            fi

            echo ""
            echo "URL:  $URL"
            echo "File: $FILENAME"

            download_file "$URL" "$FILENAME" || true
          done

          # ------------------------------------------------------------
          # PHASE 2: PACKAGE
          # ------------------------------------------------------------
          echo ""
          echo "=== Phase 2: Packaging ==="

          VALID=()
          for f in tmp_downloads/*; do
            [ -f "$f" ] && [ -s "$f" ] && VALID+=("$f")
          done

          if [ ${#VALID[@]} -gt 0 ]; then
            ARCHIVE="archive_$(date +%Y%m%d_%H%M%S)"
            mkdir -p "$STAGING/$ARCHIVE"

            echo "Creating archive: $ARCHIVE"
            do_zip_multi \
              "$STAGING/$ARCHIVE/${ARCHIVE}.zip" \
              "$SPLIT_MB" \
              "${VALID[@]}"

            echo "Packaged: $ARCHIVE"
          else
            echo "❌ No valid files were successfully downloaded."
            exit 1
          fi

          rm -rf tmp_downloads
          echo ""
          echo "=== Final staging contents ==="
          find "$STAGING" -type f | sort

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-releases@v2
        with:
          tag_name: "dl-${{ github.run_id }}-${{ github.run_attempt }}"
          name: "📦 Download Archive (${{ github.run_id }})"
          body: |
            ### 📥 Your Requested Download is Ready!
            
            Your massive file payload has been successfully broken down into safe, individual chunk assets below.
            
            #### 🛠️ How to reassemble this file:
            1. Download **all** listed part files below to the exact same folder on your local machine.
            2. Verify you have the master `.zip` file alongside all numerical extensions (`.z01`, `.z02`, etc.).
            3. Open **only** the primary `.zip` extension file using a tool like [7-Zip](https://www.7-zip.org/) or [WinRAR](https://www.rarlab.com/).
            4. Click **Extract**, and the utility engine will auto-combine all pieces seamlessly back into your single original file.
          files: |
            /tmp/staging_*/**/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
